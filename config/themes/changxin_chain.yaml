    source: manual
    source_ref: "changxin_chain — 实施前请核实年报/公告持股比例与投资主体"

  - code: "603986"
    target_entity_id: changxin
    link_type: concept
    role: 存储产业链同业/国产替代主题
    strength: low
    direction: positive
    pricing_driver: mixed
    summary: 存储设计龙头，与长鑫同属国产存储景气主题，非直接股权关系
    source: manual
    source_ref: changxin_chain

  - code: "301308"
    target_entity_id: storage_shortage
    link_type: supply_chain
    role: 存储模组
    strength: medium
    direction: positive
    pricing_driver: core_business
    summary: 存储模组厂商，存储供需紧张时受益逻辑相对直接
    source: manual
    source_ref: changxin_chain
